# Smiya jdida kat'beyyen l'hadaf kaml
name: Java CI, Build, and Push Docker Image

on:
  push:
    branches: [ "back-final-malki" ]
  workflow_dispatch:

# Ghadi n'3arfo smiy dial l'image hna bach t'koun waad7a
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # Hada ghay'akhod smiya "ahm-dev-cod/stagefinderB" automatiquement

jobs:
  build-test-and-push:
    runs-on: ubuntu-latest
    # Kan'3tiw l'workflow permissions bach y'9der y'kteb f'l'package registry
    permissions:
      contents: read
      packages: write

    steps:
      # L'khotwa 1: Checkout (Nafs l'khadma)
      - name: Checkout code
        uses: actions/checkout@v4

      # L'khotwa 2: Set up JDK (Nafs l'khadma)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # L'khotwa 3: Build & Test (Hia l'commande li nej7at lina f'l'kher)
      - name: Build and Test with Maven
        run: mvn -B verify -Pci --file pom.xml

      # === KHOTOWAT JDAD DIAL DOCKER ===

      # L'khotwa 4: T'connecta l'l'blassa fin ghadi n'khazno l'image (GitHub Container Registry)
      - name: Log in to the GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Hada token automatique men GitHub

      # L'khotwa 5: T'kherrej les métadonnées (bhal les tags) l'l'image
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      # L'khotwa 6 (L'khera): T'bni l'image men Dockerfile w t'pushiha l'l'registry
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: . # Kan'golo lih "Dockerfile kayn hna f'l'racine"
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}