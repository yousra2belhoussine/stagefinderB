spring.application.name=stagefinder_v4
# Configuration PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/stagefinder_v4
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.websocket.servlet.WebSocketMessagingAutoConfiguration

# ParamŤtres Hibernate/JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=public

# Logging (optionnel)
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.socket=DEBUG
logging.level.org.springframework.messaging=DEBUG
logging.level.ma.stagefinder=DEBUG

# Liquibase
#spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
#spring.liquibase.enabled=true

# Dťsactiver la sťrialisation par dťfaut sous forme de tableau
spring.jackson.serialization.write-dates-as-timestamps=false

# (Optionnel) Dťfinir un format par dťfaut (ISO 8601)
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

# JWT CONFIGURATION
jwt.secret=MaCleJWTSecreteEtLongue1234567890!
jwt.expiration=10000000
jwt.refresh-expiration=604800000

# URL du frontend Angular
#frontend.url=http://localhost:4200

#app.upload.cv-dir=uploads/cv
#app.upload.logo-dir=uploads/logos
#app.upload.lettre-dir=uploads/lettres
file.upload-dir=uploads
file.images-dir=uploads/images
file.documents-dir=uploads/documents

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
