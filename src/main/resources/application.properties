# ==========================================================
# == Active le profil 'local' pour lire les secrets locaux ==
# ==========================================================
spring.profiles.active=local

spring.application.name=stagefinder_v3

# Configuration PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/stagefinder_v3
spring.datasource.username=postgres
spring.datasource.password=@DB_PASSWORD@
spring.datasource.driver-class-name=org.postgresql.Driver

# Param×tres Hibernate/JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# JWT CONFIGURATION
jwt.secret=@JWT_SECRET@
jwt.expiration=10000000
jwt.refresh-expiration=604800000

# URL du Frontend (POUR LES EMAILS)
app.frontend-url=http://localhost:4200

# Configuration Email (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=malki.mohammed.1997@gmail.com
spring.mail.password=@MAIL_APP_PASSWORD@
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Configuration Upload de fichiers
file.upload-dir=uploads
file.images-dir=uploads/images
file.documents-dir=uploads/documents
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Configuration Jackson pour les dates
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.ma.stagefinder=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ===============================================
# ====   CONFIGURATION REDIS (CACHE)         ====
# ===============================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis
