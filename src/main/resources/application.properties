# ==========================================================
# == Active le profil 'local' pour lire les secrets locaux ==
# ==========================================================
spring.profiles.active=local

spring.application.name=stagefinder_v2

# Configuration PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/stagefinder_v2
spring.datasource.username=postgres
spring.datasource.password=@DB_PASSWORD@
spring.datasource.driver-class-name=org.postgresql.Driver

# Parametres Hibernate/JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=public

# Logging (optionnel)
logging.level.org.springframework.security=DEBUG
logging.level.ma.stagefinder=DEBUG

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# Desactiver la serialisation par defaut sous forme de tableau
spring.jackson.serialization.write-dates-as-timestamps=false

# (Optionnel) Definir un format par defaut (ISO 8601)
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

# JWT CONFIGURATION
jwt.secret=@JWT_SECRET@
jwt.expiration=10000000
jwt.refresh-expiration=604800000

# URL du frontend Angular
app.frontend-url=http://localhost:4200

app.upload.cv-dir=uploads/cvs
app.upload.logo-dir=uploads/logos
app.upload.lettre-dir=uploads/lettres

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================================
# ==== Configuration Email (Gmail SMTP) ====
# ===============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=malki.mohammed.1997@gmail.com
spring.mail.password=@MAIL_APP_PASSWORD@

# Proprietes pour Gmail
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==================================================
# ==       CONFIGURATION DES CLES STRIPE          ==
# ==================================================
# Cle secrete de Stripe pour l'API
stripe.api.secret-key=@STRIPE_SECRET_KEY@

# ID du prix pour le plan "StageFinder Pro"
stripe.api.price-id=price_1RaJcPRouoRAQAQAthFPlyis

# Cle secrete pour la verification du Webhook
stripe.api.webhook-secret=@STRIPE_WEBHOOK_SECRET@

# ==== Configuration Redis ====
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis

# Affiche les requetes SQL generees par Hibernate dans la console
logging.level.org.hibernate.SQL=DEBUG