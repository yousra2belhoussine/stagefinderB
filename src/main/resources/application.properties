spring.application.name=stagefinder_v2

# Configuration PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/stagefinder_v2
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# ParamĶtres Hibernate/JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=public

# Logging (optionnel)
logging.level.org.springframework.security=DEBUG
logging.level.ma.stagefinder=DEBUG

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# Dķsactiver la sķrialisation par dķfaut sous forme de tableau
spring.jackson.serialization.write-dates-as-timestamps=false

# (Optionnel) Dķfinir un format par dķfaut (ISO 8601)
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

# JWT CONFIGURATION
jwt.secret=MaCleJWTSecreteEtLongue1234567890!
jwt.expiration=10000000
jwt.refresh-expiration=604800000

# URL du frontend Angular
#frontend.url=http://localhost:4200

app.upload.cv-dir=uploads/cvs
app.upload.logo-dir=uploads/logos
app.upload.lettre-dir=uploads/lettres

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
