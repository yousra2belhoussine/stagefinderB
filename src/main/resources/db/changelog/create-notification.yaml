databaseChangeLog:
  - changeSet:
      id: create-notification-table
      author: auto-gen
      changes:
        - createTable:
            tableName: notification
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
              - column:
                  name: message
                  type: VARCHAR(1000)
              - column:
                  name: date_envoie
                  type: TIMESTAMP
              - column:
                  name: is_read
                  type: BOOLEAN
                  constraints:
                    nullable: false
                  defaultValue: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: notification
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_notification_user
            onDelete: CASCADE