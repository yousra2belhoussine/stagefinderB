databaseChangeLog:
  - changeSet:
      id: 1
      author: ilyas
      changes:
        - createTable:
            tableName: user # <-- CORRIGÉ: On garde "user"
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true } }
              - column: { name: nom, type: varchar(255), constraints: { unique: true, nullable: false } }
              - column: { name: email, type: varchar(255), constraints: { unique: true, nullable: false } }
              - column: { name: nom_entreprise, type: varchar(255), constraints: { nullable: true } }
              - column: { name: RC, type: varchar(50), constraints: { unique: true, nullable: true } }
              - column: { name: ICE, type: varchar(50), constraints: { unique: true, nullable: true } }
              - column: { name: password, type: varchar(255), constraints: { nullable: false } }
              - column: { name: tel, type: varchar(20), constraints: { unique: true, nullable: false } }
              - column: { name: cv_file, type: varchar(255) }
              - column: { name: est_valide, type: boolean, defaultValue: "false" }
              - column: { name: verified_at, type: timestamp, constraints: { nullable: true } }
              - column: { name: adresse, type: varchar(255) }
              - column: { name: image, type: varchar(255) }
              - column: { name: role, type: varchar(20), constraints: { nullable: false } }
              - column: { name: created_at, type: timestamp, defaultValueComputed: "CURRENT_TIMESTAMP" }

  - changeSet:
      id: 2
      author: ahmed
      changes:
        - createTable:
            tableName: categorie
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true } }
              - column: { name: titre, type: varchar(255), constraints: { nullable: false } }
              - column: { name: type_categorie, type: varchar(50), constraints: { nullable: false } }

  - changeSet:
      id: 3
      author: ahmed
      changes:
        - createTable:
            tableName: offre
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true } }
              - column: { name: description, type: text }
              - column: { name: ville, type: varchar(100) }
              - column: { name: annees_experience, type: varchar(255), constraints: { nullable: false } }
              - column: { name: nom_entreprise, type: varchar(255) }
              - column: { name: date_publication, type: timestamp }
              - column: { name: date_expiration, type: timestamp }
              - column: { name: salaire, type: float }
              - column: { name: competence_exigee, type: varchar(255) }
              - column: { name: categorie_id, type: bigint, constraints: { nullable: false } }
              - column: { name: publie_par_id, type: bigint, constraints: { nullable: false } }
        - addForeignKeyConstraint:
            baseTableName: offre
            baseColumnNames: categorie_id
            constraintName: fk_offre_categorie
            referencedTableName: categorie
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: offre
            baseColumnNames: publie_par_id
            constraintName: fk_offre_user
            referencedTableName: user # <-- CORRIGÉ
            referencedColumnNames: id

  - changeSet:
      id: 4
      author: ahmed
      changes:
        - createTable:
            tableName: candidature
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true } }
              - column: { name: date_de_candidature, type: timestamp }
              - column: { name: statut_candidature, type: varchar(20), constraints: { nullable: false } }
              - column: { name: lettre_de_motivation, type: text }
              - column: { name: cv_choisi, type: varchar(255) }
              - column: { name: user_id, type: bigint, constraints: { nullable: false } }
              - column: { name: offre_id, type: bigint, constraints: { nullable: false } }
        - addForeignKeyConstraint:
            baseTableName: candidature
            baseColumnNames: user_id
            constraintName: fk_candidature_user
            referencedTableName: user # <-- CORRIGÉ
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: candidature
            baseColumnNames: offre_id
            constraintName: fk_candidature_offre
            referencedTableName: offre
            referencedColumnNames: id

  - changeSet:
      id: 5
      author: ahmed
      changes:
        - createTable:
            tableName: favoris
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true } }
              - column: { name: date_ajout, type: timestamp }
              - column: { name: user_id, type: bigint, constraints: { nullable: false } }
              - column: { name: offre_id, type: bigint, constraints: { nullable: false } }
        - addForeignKeyConstraint:
            baseTableName: favoris
            baseColumnNames: user_id
            constraintName: fk_favoris_user
            referencedTableName: user # <-- CORRIGÉ
            referencedColumnNames: id
        - addForeignKeyConstraint:
            baseTableName: favoris
            baseColumnNames: offre_id
            constraintName: fk_favoris_offre
            referencedTableName: offre
            referencedColumnNames: id

  - changeSet:
      id: 6
      author: ahmed
      changes:
        - createTable:
            tableName: notification
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true } }
              - column: { name: message, type: varchar(255), constraints: { nullable: false } }
              - column: { name: date_envoie, type: timestamp }
              - column: { name: user_id, type: bigint, constraints: { nullable: false } }
        - addForeignKeyConstraint:
            baseTableName: notification
            baseColumnNames: user_id
            constraintName: fk_notification_user
            referencedTableName: user # <-- CORRIGÉ
            referencedColumnNames: id

  - changeSet:
      id: 7
      author: malki.mohammed
      changes:
        - createTable:
            tableName: action_token
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: token, type: varchar(255), constraints: { unique: true, nullable: false } }
              - column: { name: type, type: varchar(50), constraints: { nullable: false } }
              - column: { name: expires_at, type: timestamp, constraints: { nullable: false } }
              - column: { name: user_id, type: bigint, constraints: { nullable: false } }
        - addForeignKeyConstraint:
            baseTableName: action_token
            baseColumnNames: user_id
            constraintName: fk_action_token_on_user
            referencedTableName: user # <-- CORRIGÉ
            referencedColumnNames: id
            onDelete: CASCADE

  - changeSet:
      id: 18 # ID unique pour la table token
      author: malki.mohammed
      changes:
        - createTable:
            tableName: token
            columns:
              - column: { name: id, type: bigint, autoIncrement: true, constraints: { primaryKey: true } }
              - column: { name: token, type: varchar(255), constraints: { unique: true, nullable: false } }
              - column: { name: expired, type: boolean, defaultValueBoolean: false }
              - column: { name: revoked, type: boolean, defaultValueBoolean: false }
              - column: { name: token_type, type: varchar(50) }
              - column: { name: created_at, type: timestamp }
              - column: { name: user_id, type: bigint, constraints: { nullable: false } }
        - addForeignKeyConstraint:
            baseTableName: token
            baseColumnNames: user_id
            constraintName: fk_token_on_user
            referencedTableName: user # <-- CORRIGÉ
            referencedColumnNames: id
            onDelete: CASCADE
