databaseChangeLog:
  - changeSet:
      id: 1
      author: ahmed
      changes:
        - createTable:
            tableName: user
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: nom
                  type: varchar(255)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: nom_entreprise
                  type: varchar(255)
                  constraints:
                    nullable: true
              - column:
                  name: RC
                  type: varchar(50)
                  constraints:
                    unique: true
                    nullable: true
              - column:
                  name: ICE
                  type: varchar(50)
                  constraints:
                    unique: true
                    nullable: true
              - column:
                  name: password
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: tel
                  type: varchar(20)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: cv_file
                  type: varchar(255)
              - column:
                  name: est_valide
                  type: boolean
                  defaultValue: false
              - column:
                  name: adresse
                  type: varchar(255)
              - column:
                  name: image
                  type: varchar(255)
              - column:
                  name: role
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP

  - changeSet:
      id: 2
      author: ahmed
      changes:
        - createTable:
            tableName: categorie
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: titre
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: type_categorie
                  type: varchar(50)
                  constraints:
                    nullable: false

  - changeSet:
      id: 3
      author: ahmed
      changes:
        - createTable:
            tableName: offre
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: description
                  type: text
              - column:
                  name: ville
                  type: varchar(100)
              - column:
                  name: annees_experience
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: nom_entreprise
                  type: varchar(255)
              - column:
                  name: date_publication
                  type: timestamp
              - column:
                  name: date_expiration
                  type: timestamp
              - column:
                  name: salaire
                  type: float
              - column:
                  name: competence_exigee
                  type: varchar(255)
              - column:
                  name: categorie_id
                  type: bigint
                  constraints:
                    foreignKeyName: fk_offre_categorie
                    references: categorie(id)
              - column:
                  name: publie_par_id
                  type: bigint
                  constraints:
                    foreignKeyName: fk_offre_user
                    references: user(id)

  - changeSet:
      id: 4
      author: ahmed
      changes:
        - createTable:
            tableName: candidature
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: date_de_candidature
                  type: timestamp
              - column:
                  name: statut_candidature
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: lettre_de_motivation
                  type: text
              - column:
                  name: cv_choisi
                  type: varchar(255)
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    foreignKeyName: fk_candidature_user
                    references: user(id)
              - column:
                  name: offre_id
                  type: bigint
                  constraints:
                    foreignKeyName: fk_candidature_offre
                    references: offre(id)

  - changeSet:
      id: 5
      author: ahmed
      changes:
        - createTable:
            tableName: favoris
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: date_ajout
                  type: timestamp
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    foreignKeyName: fk_favoris_user
                    references: user(id)
              - column:
                  name: offre_id
                  type: bigint
                  constraints:
                    foreignKeyName: fk_favoris_offre
                    references: offre(id)

  - changeSet:
      id: 6
      author: ahmed
      changes:
        - createTable:
            tableName: notification
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: message
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: date_envoie
                  type: timestamp
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    foreignKeyName: fk_notification_user
                    references: user(id)

  - changeSet:
      id: 7
      author: ahmed
      changes:
        - createTable:
            tableName: avis
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: commentaire
                  type: text
              - column:
                  name: date_publication
                  type: timestamp
              - column:
                  name: auteur_id
                  type: bigint
                  constraints:
                    foreignKeyName: fk_avis_auteur
                    references: user(id)
              - column:
                  name: destinataire_id
                  type: bigint
                  constraints:
                    foreignKeyName: fk_avis_destinataire
                    references: user(id)
              - column:
                  name: offre_id
                  type: bigint
                  constraints:
                    foreignKeyName: fk_avis_offre
                    references: offre(id)
              - column:
                  name: note
                  type: int
                  constraints:
                    nullable: false

