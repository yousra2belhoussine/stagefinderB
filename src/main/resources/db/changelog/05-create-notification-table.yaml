databaseChangeLog:
  - changeSet:
      id: 4
      author: ahmed
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                schemaName: public
                tableName: notification
      changes:
        - createTable:
            schemaName: public
            tableName: notification
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: notification_pkey
              - column:
                  name: message
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: date_envoie
                  type: TIMESTAMP WITHOUT TIME ZONE
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_notification_user
                    references: public.user(id)