databaseChangeLog:
  - changeSet:
      id: 1
      author: Ahmed
      changes:
        - createTable:
            tableName: user
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: nom
                  type: varchar(255)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: nom_entreprise
                  type: varchar(255)
                  constraints:
                    nullable: true
              - column:
                  name: RC
                  type: varchar(50)
                  constraints:
                    unique: true
                    nullable: true
              - column:
                  name: ICE
                  type: varchar(50)
                  constraints:
                    unique: true
                    nullable: true
              - column:
                  name: password
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: tel
                  type: varchar(20)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: cv_file
                  type: varchar(255)
                  constraints:
                    nullable: true
              - column:
                  name: est_valide
                  type: boolean
                  defaultValue: false
              - column:
                  name: adresse
                  type: varchar(255)
                  constraints:
                    nullable: true
              - column:
                  name: image
                  type: varchar(255)
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: role
                  type: varchar(20)
                  constraints:
                    nullable: false